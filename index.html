<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Font Selector</title>
    <style>
        @font-face {
            font-family: 'CustomFont21063';
            src: url('21063.otf') format('opentype');
            font-weight: normal;
            font-style: normal;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            background: #0b0914;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            color: #ffffff;
            padding: 20px;
        }

        .slider-container {
            position: relative;
            width: 100%;
            max-width: 360px;
            padding: 30px 24px;
            background: rgba(255, 255, 255, 0.03);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.08);
            border-radius: 28px;
            box-shadow: 0 24px 48px rgba(0, 0, 0, 0.5);
            text-align: center;
        }

        .slider-wrapper {
            overflow: hidden;
            margin-bottom: 25px;
        }

        .font-card {
            padding: 20px 10px;
        }

        .font-preview {
            font-family: 'CustomFont21063', sans-serif;
            font-size: 72px;
            line-height: 1.2;
            margin-bottom: 15px;
            color: #ffffff;
            text-shadow: 0 0 20px rgba(255, 255, 255, 0.2);
            word-break: break-all;
        }

        .font-name {
            font-family: 'CustomFont21063', sans-serif;
            font-size: 20px;
            color: #a0a0b0;
            letter-spacing: 0.5px;
        }

        .nav-box {
            display: flex;
            justify-content: center;
            gap: 20px;
            margin-bottom: 25px;
        }

        .nav-btn {
            width: 54px;
            height: 54px;
            background: rgba(255, 255, 255, 0.06);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 16px;
            color: #ffffff;
            font-size: 20px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: background 0.2s, transform 0.1s;
        }

        .nav-btn:active {
            background: rgba(255, 255, 255, 0.15);
            transform: scale(0.95);
        }

        .action-btn {
            width: 100%;
            padding: 16px;
            background: #ffffff;
            color: #0b0914;
            border: none;
            border-radius: 16px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: background 0.2s, transform 0.1s;
        }

        .action-btn:active {
            background: #e0e0e0;
            transform: scale(0.98);
        }

        @media (hover: hover) {
            .nav-btn:hover {
                background: rgba(255, 255, 255, 0.12);
            }
            .action-btn:hover {
                background: #f0f0f0;
            }
        }
    </style>
</head>
<body>

    <div class="slider-container">
        
        <div class="slider-wrapper">
            <div class="font-card">
                <div class="font-preview" id="fontPreview">Aa</div>
                <div class="font-name" id="fontName">21063.otf</div>
            </div>
        </div>

        <div class="nav-box">
            <button class="nav-btn" id="prevBtn">&#10094;</button>
            <button class="nav-btn" id="nextBtn">&#10095;</button>
        </div>

        <button class="action-btn" id="applyBtn">Сделать</button>
    </div>

    <script src="script.js"></script>
</body>
</html>
